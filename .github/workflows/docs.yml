name: Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'packages/**/*.md'
      - '.mise.toml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install
      - name: Build
        run: |
          cd docs
          vp install
          vp run build
          cp ../README.md ./dist/README.md
          mkdir -p ./dist/.github
          cp ../.github/FUNDING.yml ./dist/.github/FUNDING.yml
      - name: Deploy
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: faasjs/faasjs.github.io
          publish_branch: main
          publish_dir: ./docs/dist
          personal_token: ${{ secrets.FAASJS_TOKEN }}
          exclude_assets: ''
